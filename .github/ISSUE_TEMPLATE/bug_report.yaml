name: Report a bug
description: |
  You detected something wrong on the application.
labels: ["bug"]
body:
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the problem you are running into.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected-results
    attributes:
      label: Expected results
      description: What is expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual-results
    attributes:
      label: Actual results
      description: What is actually happening.
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or Video
      description: |
        Upload any screenshots or video of the bug.
      value: |
        Screenshots or video demonstration
    validations:
      required: true
  - type: textarea
    id: device-os-app-details
    attributes:
      label: Device, OS details and app details
      description: |
        Some details about the device, OS version and app version you are running the application.
      value: |
        - Device: (eg: iPhone 17)
        - OS version: (eg: iOS 16)
        - App version: (eg: v2.16.0)
  - type: textarea
    id: linkwarden-version
    attributes:
      label: Linkwarden version
      description: |
        The version of Linkwarden you are running.
      value: |
        - Linkwarden version: (eg: v2.13.0)

    validations:
      required: true